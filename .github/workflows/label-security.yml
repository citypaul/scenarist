name: Label Security PRs

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      # Security policies and configs
      - "SECURITY.md"
      - ".gitleaks.toml"
      - ".github/dependabot.yml"
      # Security-specific workflows only (not all workflows)
      - ".github/workflows/codeql.yml"
      - ".github/workflows/scorecard.yml"
      - ".github/workflows/semgrep.yml"
      - ".github/workflows/secrets-scan.yml"
      - ".github/workflows/dependency-review.yml"
      - ".github/workflows/label-security.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Add Security Label
    runs-on: ubuntu-latest
    steps:
      - name: Add security label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Check if label exists, create if not
            try {
              await github.rest.issues.getLabel({
                owner,
                repo,
                name: 'security'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'security',
                  color: 'd93f0b',
                  description: 'Security-related changes requiring careful review'
                });
              }
            }

            // Add label to PR
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['security']
            });

            console.log(`Added 'security' label to PR #${issue_number}`);
